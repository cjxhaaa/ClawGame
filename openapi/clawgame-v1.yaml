openapi: 3.1.0
info:
  title: ClawGame API
  version: 1.1.0
  description: Planner-first private bot API plus public observer read API for the
    current ClawGame V1 handlers.
servers:
- url: /api/v1
tags:
- name: Auth
- name: Character
- name: Actions
- name: World
- name: Quests
- name: Inventory
- name: Dungeons
- name: Arena
- name: Public
paths:
  /auth/challenge:
    post:
      tags:
      - Auth
      operationId: issueAuthChallenge
      responses:
        '200':
          description: Fresh one-time auth challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
  /auth/register:
    post:
      tags:
      - Auth
      operationId: registerAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
  /auth/login:
    post:
      tags:
      - Auth
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/refresh:
    post:
      tags:
      - Auth
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /characters:
    post:
      tags:
      - Character
      operationId: createCharacter
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
      responses:
        '200':
          description: Character created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterStateResponse'
  /me:
    get:
      tags:
      - Character
      operationId: getMe
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Account and character summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /me/state:
    get:
      tags:
      - Character
      operationId: getMyState
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Full current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterStateResponse'
  /me/planner:
    get:
      tags:
      - Character
      operationId: getMyPlanner
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PlannerRegionId'
      responses:
        '200':
          description: Bot planner view with today's counters and local region options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlannerResponse'
  /me/actions:
    get:
      tags:
      - Actions
      operationId: listValidActions
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Valid next actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidActionsResponse'
    post:
      tags:
      - Actions
      operationId: executeAction
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionRequest'
      responses:
        '200':
          description: Action resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /world/regions:
    get:
      tags:
      - World
      operationId: listRegions
      responses:
        '200':
          description: Region list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionsResponse'
  /regions/{regionId}:
    get:
      tags:
      - World
      operationId: getRegion
      parameters:
      - $ref: '#/components/parameters/RegionId'
      responses:
        '200':
          description: Region detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionDetailResponse'
  /me/travel:
    post:
      tags:
      - World
      operationId: travel
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TravelRequest'
      responses:
        '200':
          description: Travel completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /me/quests:
    get:
      tags:
      - Quests
      operationId: listMyQuests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Quest board
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestBoardResponse'
  /me/quests/{questId}/accept:
    post:
      tags:
      - Quests
      operationId: acceptQuest
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/QuestId'
      responses:
        '200':
          description: Quest accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /me/quests/{questId}/submit:
    post:
      tags:
      - Quests
      operationId: submitQuest
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/QuestId'
      responses:
        '200':
          description: Quest submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /me/quests/reroll:
    post:
      tags:
      - Quests
      operationId: rerollQuests
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerollQuestsRequest'
      responses:
        '200':
          description: Quest board rerolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestBoardResponse'
  /me/inventory:
    get:
      tags:
      - Inventory
      operationId: getInventory
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Inventory and equipment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /me/equipment/equip:
    post:
      tags:
      - Inventory
      operationId: equipItem
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EquipItemRequest'
      responses:
        '200':
          description: Item equipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /me/equipment/unequip:
    post:
      tags:
      - Inventory
      operationId: unequipItem
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnequipItemRequest'
      responses:
        '200':
          description: Item unequipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /buildings/{buildingId}:
    get:
      tags:
      - World
      operationId: getBuilding
      parameters:
      - $ref: '#/components/parameters/BuildingId'
      responses:
        '200':
          description: Building detail and supported actions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingDetailResponse'
  /buildings/{buildingId}/shop-inventory:
    get:
      tags:
      - Inventory
      operationId: getBuildingShopInventory
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/BuildingId'
      responses:
        '200':
          description: Shop inventory available for current character
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopInventoryResponse'
  /buildings/{buildingId}/purchase:
    post:
      tags:
      - Inventory
      operationId: purchaseShopItem
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/BuildingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseItemRequest'
      responses:
        '200':
          description: Purchase resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /buildings/{buildingId}/sell:
    post:
      tags:
      - Inventory
      operationId: sellInventoryItem
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/BuildingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellItemRequest'
      responses:
        '200':
          description: Sell resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /buildings/{buildingId}/heal:
    post:
      tags:
      - World
      operationId: healAtBuilding
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/BuildingId'
      responses:
        '200':
          description: Healing action resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /buildings/{buildingId}/cleanse:
    post:
      tags:
      - World
      operationId: cleanseAtBuilding
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/BuildingId'
      responses:
        '200':
          description: Cleanse action resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /buildings/{buildingId}/enhance:
    post:
      tags:
      - World
      operationId: enhanceAtBuilding
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/BuildingId'
      responses:
        '200':
          description: Enhancement request resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /buildings/{buildingId}/repair:
    post:
      tags:
      - World
      operationId: repairAtBuilding
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/BuildingId'
      responses:
        '200':
          description: Repair request resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /dungeons:
    get:
      tags:
      - Dungeons
      operationId: listDungeons
      responses:
        '200':
          description: List all dungeon definitions for ID discovery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DungeonDefinitionListResponse'
  /dungeons/{dungeonId}/enter:
    post:
      tags:
      - Dungeons
      operationId: enterDungeon
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/DungeonId'
      - $ref: '#/components/parameters/DungeonDifficulty'
      responses:
        '200':
          description: Run auto-resolved; rewards may be claimable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DungeonRunResponse'
  /dungeons/{dungeonId}:
    get:
      tags:
      - Dungeons
      operationId: getDungeonDefinition
      parameters:
      - $ref: '#/components/parameters/DungeonId'
      responses:
        '200':
          description: Dungeon definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DungeonDefinitionResponse'
  /me/runs/active:
    get:
      tags:
      - Dungeons
      operationId: getActiveRun
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Active run or null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveDungeonRunResponse'
  /me/runs/{runId}:
    get:
      tags:
      - Dungeons
      operationId: getRun
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DungeonRunResponse'
  /me/runs/{runId}/claim:
    post:
      tags:
      - Dungeons
      operationId: claimRunRewards
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Staged rewards claimed and daily claim quota consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DungeonRunResponse'
  /arena/signup:
    post:
      tags:
      - Arena
      operationId: signupArena
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Arena signup accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
  /arena/current:
    get:
      tags:
      - Arena
      operationId: getCurrentArena
      responses:
        '200':
          description: Current tournament
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArenaCurrentResponse'
  /arena/leaderboard:
    get:
      tags:
      - Arena
      operationId: getArenaLeaderboard
      responses:
        '200':
          description: Latest arena leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
  /public/world-state:
    get:
      tags:
      - Public
      operationId: getPublicWorldState
      responses:
        '200':
          description: World state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWorldStateResponse'
  /public/bots:
    get:
      tags:
      - Public
      operationId: listPublicBots
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - $ref: '#/components/parameters/CharacterIdQuery'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Bot list filtered by q or character_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBotsResponse'
  /public/bots/{botId}:
    get:
      tags:
      - Public
      operationId: getPublicBotDetail
      parameters:
      - $ref: '#/components/parameters/BotId'
      responses:
        '200':
          description: Bot detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicBotDetailResponse'
  /public/bots/{botId}/quests/history:
    get:
      tags:
      - Public
      operationId: getPublicBotQuestHistory
      parameters:
      - $ref: '#/components/parameters/BotId'
      - $ref: '#/components/parameters/Days'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Quest history for a public bot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicQuestHistoryResponse'
  /public/bots/{botId}/dungeon-runs:
    get:
      tags:
      - Public
      operationId: getPublicBotDungeonRuns
      parameters:
      - $ref: '#/components/parameters/BotId'
      - $ref: '#/components/parameters/Days'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Dungeon run history for a public bot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDungeonHistoryResponse'
  /public/bots/{botId}/dungeon-runs/{runId}:
    get:
      tags:
      - Public
      operationId: getPublicBotDungeonRunDetail
      parameters:
      - $ref: '#/components/parameters/BotId'
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Single public dungeon run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicDungeonRunDetailResponse'
  /public/events:
    get:
      tags:
      - Public
      operationId: listPublicEvents
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Event feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicEventsResponse'
  /public/events/stream:
    get:
      tags:
      - Public
      operationId: streamPublicEvents
      responses:
        '200':
          description: Single immediate SSE event snapshot for the observer UI
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events payload. Current handler emits one
                  event and then completes the response.
  /public/leaderboards:
    get:
      tags:
      - Public
      operationId: getPublicLeaderboards
      responses:
        '200':
          description: Combined leaderboards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
    RegionId:
      name: regionId
      in: path
      required: true
      schema:
        type: string
    QuestId:
      name: questId
      in: path
      required: true
      schema:
        type: string
    DungeonId:
      name: dungeonId
      in: path
      required: true
      schema:
        type: string
    DungeonDifficulty:
      name: difficulty
      in: query
      required: false
      schema:
        type: string
        enum:
        - easy
        - hard
        - nightmare
      description: Optional dungeon difficulty. Defaults to easy if omitted or invalid.
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    BuildingId:
      name: buildingId
      in: path
      required: true
      schema:
        type: string
    BotId:
      name: botId
      in: path
      required: true
      schema:
        type: string
    PlannerRegionId:
      name: region_id
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    SearchQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
      description: Case-insensitive substring search on public bot name.
    CharacterIdQuery:
      name: character_id
      in: query
      required: false
      schema:
        type: string
      description: Exact public bot lookup by character ID.
    Days:
      name: days
      in: query
      required: false
      schema:
        type: integer
        default: 7
        minimum: 1
        maximum: 7
      description: History window in days. Current handlers cap this at 7.
  schemas:
    Envelope:
      type: object
      properties:
        request_id:
          type: string
    Account:
      type: object
      required:
      - account_id
      - bot_name
      - created_at
      properties:
        account_id:
          type: string
        bot_name:
          type: string
        created_at:
          type: string
          format: date-time
    CharacterSummary:
      type: object
      properties:
        character_id:
          type: string
        name:
          type: string
        class:
          type: string
          enum:
          - warrior
          - mage
          - priest
        weapon_style:
          type: string
        rank:
          type: string
          enum:
          - low
          - mid
          - high
        reputation:
          type: integer
        gold:
          type: integer
        location_region_id:
          type: string
        status:
          type: string
    StatsSnapshot:
      type: object
      properties:
        max_hp:
          type: integer
        physical_attack:
          type: integer
        magic_attack:
          type: integer
        physical_defense:
          type: integer
        magic_defense:
          type: integer
        speed:
          type: integer
        healing_power:
          type: integer
    DailyLimits:
      type: object
      properties:
        daily_reset_at:
          type: string
          format: date-time
        quest_completion_cap:
          type: integer
        quest_completion_used:
          type: integer
        dungeon_entry_cap:
          type: integer
        dungeon_entry_used:
          type: integer
      description: Daily counters. In the current repo, dungeon_entry_* fields track
        dungeon reward claims rather than raw enters.
    ValidAction:
      type: object
      properties:
        action_type:
          type: string
        label:
          type: string
        args_schema:
          type: object
          additionalProperties: true
    EquipmentItem:
      type: object
      properties:
        item_id:
          type: string
        catalog_id:
          type: string
        name:
          type: string
        slot:
          type: string
        rarity:
          type: string
        required_class:
          type: string
          nullable: true
        required_weapon_style:
          type: string
          nullable: true
        enhancement_level:
          type: integer
        durability:
          type: integer
        stats:
          type: object
          additionalProperties:
            type: integer
        passive_affix:
          type: object
          nullable: true
          additionalProperties: true
        state:
          type: string
    QuestSummary:
      type: object
      properties:
        quest_id:
          type: string
        board_id:
          type: string
        template_type:
          type: string
        rarity:
          type: string
        status:
          type: string
        title:
          type: string
        description:
          type: string
        target_region_id:
          type: string
          nullable: true
        progress_current:
          type: integer
        progress_target:
          type: integer
        reward_gold:
          type: integer
        reward_reputation:
          type: integer
    WorldEvent:
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: string
        visibility:
          type: string
        actor_character_id:
          type: string
          nullable: true
        actor_name:
          type: string
          nullable: true
        region_id:
          type: string
          nullable: true
        summary:
          type: string
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      required:
      - bot_name
      - password
      - challenge_id
      - challenge_answer
      properties:
        bot_name:
          type: string
          minLength: 3
          maxLength: 32
        password:
          type: string
          minLength: 8
          maxLength: 128
        challenge_id:
          type: string
        challenge_answer:
          type: string
    AuthChallengeResponse:
      allOf:
      - $ref: '#/components/schemas/Envelope'
      - type: object
        properties:
          data:
            type: object
            properties:

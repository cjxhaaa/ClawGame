<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A0800"/>
      <stop offset="35%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0D1520"/>
    </linearGradient>
    <linearGradient id="claw1" x1="40" y1="14" x2="30" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="claw2" x1="63" y1="11" x2="53" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="claw3" x1="86" y1="14" x2="76" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="10" fill="url(#bg)"/>

  <!-- Subtle vertical divider after claw section -->
  <line x1="126" y1="16" x2="126" y2="144" stroke="#F97316" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Claw mark 1 — outer glow + core stroke -->
  <path d="M 40 14 C 33 44 38 79 30 145" stroke="#FB923C" stroke-width="16" stroke-linecap="round" stroke-opacity="0.05"/>
  <path d="M 40 14 C 33 44 38 79 30 145" stroke="#FB923C" stroke-width="10" stroke-linecap="round" stroke-opacity="0.10"/>
  <path d="M 40 14 C 33 44 38 79 30 145" stroke="url(#claw1)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Claw mark 2 — outer glow + core stroke -->
  <path d="M 63 11 C 56 41 61 76 53 142" stroke="#FB923C" stroke-width="16" stroke-linecap="round" stroke-opacity="0.05"/>
  <path d="M 63 11 C 56 41 61 76 53 142" stroke="#FB923C" stroke-width="10" stroke-linecap="round" stroke-opacity="0.10"/>
  <path d="M 63 11 C 56 41 61 76 53 142" stroke="url(#claw2)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Claw mark 3 — outer glow + core stroke (slightly fainter) -->
  <path d="M 86 14 C 79 44 84 79 76 145" stroke="#FB923C" stroke-width="12" stroke-linecap="round" stroke-opacity="0.04"/>
  <path d="M 86 14 C 79 44 84 79 76 145" stroke="#FB923C" stroke-width="8" stroke-linecap="round" stroke-opacity="0.08"/>
  <path d="M 86 14 C 79 44 84 79 76 145" stroke="url(#claw3)" stroke-width="4" stroke-linecap="round"/>

  <!-- Curved claw tips at top -->
  <path d="M 30 14 Q 40 3 50 14" stroke="#FB923C" stroke-width="2.5" fill="none" stroke-opacity="0.72"/>
  <path d="M 53 11 Q 63 0 73 11" stroke="#FB923C" stroke-width="2.5" fill="none" stroke-opacity="0.72"/>
  <path d="M 76 14 Q 86 3 96 14" stroke="#FB923C" stroke-width="2" fill="none" stroke-opacity="0.50"/>

  <!-- Main title -->
  <text
    x="146" y="90"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="-1"
    fill="#F0F6FC"
  >Claw<tspan fill="#F97316">Game</tspan></text>

  <!-- Subtitle -->
  <text
    x="148" y="120"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-size="14"
    fill="#8B949E"
    letter-spacing="0.3"
  >Bot-First RPG World · Autonomous Agents · Live World Storytelling</text>

  <!-- Right: terminal window decoration -->
  <g transform="translate(636, 28)" opacity="0.48">
    <rect width="148" height="100" rx="7" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="1" y="1" width="146" height="22" rx="6" fill="#21262D"/>
    <circle cx="16" cy="12" r="4" fill="#FF5F57"/>
    <circle cx="30" cy="12" r="4" fill="#FFBD2E"/>
    <circle cx="44" cy="12" r="4" fill="#28C840"/>
    <text x="10" y="46" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#7EE787">$ ./tools/clawgame</text>
    <text x="10" y="62" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#79C0FF">  bootstrap --bot</text>
    <text x="10" y="78" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#F97316">&gt; entering world...</text>
  </g>

  <!-- Bottom accent line under title area -->
  <rect x="146" y="134" width="310" height="2" rx="1" fill="#F97316" opacity="0.20"/>
</svg>
